server {
    listen 80;

    # ── Serve React SPA ───────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /token → Node.js backend ───────────────────────────
    # Browser calls /token?room=x&username=y
    # nginx forwards it to backend container on port 3001
    location /token {
        proxy_pass         http://backend:3001/token;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Proxy /livekit → LiveKit WebSocket signal ─────────────────
    # Browser opens ws://localhost:5173/livekit
    # nginx upgrades and forwards to livekit container on port 7880
    location /livekit {
        proxy_pass         http://livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
